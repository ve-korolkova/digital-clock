<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифровые часы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        .clock-widget {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 60px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .time-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 25px;
        }

        .time-part {
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            padding: 5px 15px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .separator {
            font-size: 3.5rem;
            color: rgba(255, 255, 255, 0.7);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .date-display {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        }

        .timezone-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-style: italic;
        }

        /* Анимация при обновлении цифр */
        .time-part.updated {
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-widget">
            <h1>Цифровые часы</h1>
            <div class="time-display">
                <span class="time-part hours">00</span>
                <span class="separator">:</span>
                <span class="time-part minutes">00</span>
                <span class="separator">:</span>
                <span class="time-part seconds">00</span>
            </div>
            <div class="date-display"></div>
            <div class="timezone-info"></div>
        </div>
    </div>

    <script>
        class DigitalClock {
            constructor() {
                this.elements = {
                    hours: document.querySelector('.hours'),
                    minutes: document.querySelector('.minutes'),
                    seconds: document.querySelector('.seconds'),
                    dateDisplay: document.querySelector('.date-display'),
            timezoneInfo: document.querySelector('.timezone-info')
                };
                this.previousTime = { hours: 0, minutes: 0, seconds: 0 };
                this.init();
            }

            init() {
                this.updateTime();
                this.updateDate();
                this.displayTimezone();
                // Обновляем каждую секунду
                setInterval(() => {
                    this.updateTime();
                    this.updateDate();
                }, 1000);
            }

            formatNumber(num) {
                return num.toString().padStart(2, '0');
            }

            updateTime() {
                const now = new Date();
                const currentTime = {
                    hours: now.getHours(),
                    minutes: now.getMinutes(),
                    seconds: now.getSeconds()
                };

                // Анимация при изменении цифр
                Object.keys(currentTime).forEach(unit => {
                    if (currentTime[unit] !== this.previousTime[unit]) {
                        this.elements[unit].textContent = this.formatNumber(currentTime[unit]);
                        this.animateDigitChange(this.elements[unit]);
                    }
                });

                this.previousTime = {...currentTime};
            }

            animateDigitChange(element) {
                element.classList.add('updated');
                setTimeout(() => {
                    element.classList.remove('updated');
                }, 300);
            }

            updateDate() {
                const now = new Date();
                const options = {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                };
                const dateString = now.toLocaleDateString('ru-RU', options);
                this.elements.dateDisplay.textContent = dateString.charAt(0).toUpperCase() + dateString.slice(1);
            }

            displayTimezone() {
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                this.elements.timezoneInfo.textContent = `Часовой пояс: ${timezone}`;
            }
        }

        // Инициализация часов после загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            new DigitalClock();
        });
    </script>
</body>
</html>
