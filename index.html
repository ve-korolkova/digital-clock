<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифровые часы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .clock-widget {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 60px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        h1 { color: white; margin-bottom: 30px; font-size: 2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        
        .timezone-controls { margin-bottom: 25px; }
        .timezone-controls label { display: block; color: rgba(255,255,255,0.8); margin-bottom: 8px; font-weight: 500; }
        #city-select {
            padding: 10px 15px; border-radius: 8px; border: none; outline: none;
            font-size: 1rem; cursor: pointer; color: #333; width: 100%; max-width: 300px;
        }

        .time-display { display: flex; justify-content: center; align-items: baseline; gap: 10px; margin-bottom: 25px; }
        .time-part {
            font-size: 3.5rem; font-weight: bold; color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            padding: 5px 15px; border-radius: 10px; background: rgba(0, 0, 0, 0.2);
        }
        .separator { font-size: 3.5rem; color: rgba(255, 255, 255, 0.7); animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .date-display { color: rgba(255, 255, 255, 0.8); font-size: 1.2rem; margin-bottom: 15px; text-shadow: 0 1px 5px rgba(0,0,0,0.3); }
        .timezone-info { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-widget">
            <h1>Цифровые часы</h1>

            <div class="timezone-controls">
                <label for="city-select">Часовой пояс:</label>
                <select id="city-select">
                    <option value="" selected>Местное время</option>
                    <option value="Europe/Moscow">Москва</option>
                    <option value="America/New_York">Нью-Йорк</option>
                    <option value="Asia/Tokyo">Токио</option>
                </select>
            </div>

            <div class="time-display">
                <span class="time-part hours">00</span>
                <span class="separator">:</span>
                <span class="time-part minutes">00</span>
                <span class="separator">:</span>
                <span class="time-part seconds">00</span>
            </div>
            <div class="date-display"></div>
            <div class="timezone-info"></div>
        </div>
    </div>

    <script>
        const hoursEl = document.querySelector('.hours');
        const minutesEl = document.querySelector('.minutes');
        const secondsEl = document.querySelector('.seconds');
        const dateEl = document.querySelector('.date-display');
        const tzInfoEl = document.querySelector('.timezone-info');
        const selectEl = document.getElementById('city-select');

        function update() {
            const tz = selectEl.value; // пустая строка = локальное время

            // Время
            const timeOpts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: tz || undefined };
            const timeStr = new Date().toLocaleTimeString('ru-RU', timeOpts);
            // toLocaleTimeString возвращает "HH:MM:SS" — просто разбираем по двоеточию
            const [h, m, s] = timeStr.split(':');
            hoursEl.textContent = h;
            minutesEl.textContent = m;
            secondsEl.textContent = s;

            // Дата
            const dateOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: tz || undefined };
            let dateStr = new Date().toLocaleDateString('ru-RU', dateOpts);
            dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            dateEl.textContent = dateStr;

            // Инфо о зоне
            if (tz) {
                tzInfoEl.textContent = `Часовой пояс: ${tz}`;
            } else {
                const resolved = Intl.DateTimeFormat().resolvedOptions().timeZone;
                tzInfoEl.textContent = `Часовой пояс: (локальный) ${resolved}`;
            }
        }

        // Обновляем сразу и потом каждую секунду
        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
