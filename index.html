<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифровые часы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        .clock-widget {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 60px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .timezone-controls {
            margin-bottom: 25px;
        }
        
        .timezone-controls label {
            display: block;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
            font-weight: 500;
        }

        #city-select {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 1rem;
            cursor: pointer;
            color: #333;
            width: 100%;
            max-width: 300px;
        }

        .time-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 25px;
        }

        .time-part {
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            padding: 5px 15px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .separator {
            font-size: 3.5rem;
            color: rgba(255, 255, 255, 0.7);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .date-display {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        }

        .timezone-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-style: italic;
        }

        .time-part.updated {
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-widget">
            <h1>Цифровые часы</h1>

            <div class="timezone-controls">
                <label for="city-select">Часовой пояс:</label>
                <select id="city-select">
                    <option value="" selected>Местное время</option>
                    <option value="Europe/Moscow">Москва (Europe/Moscow)</option>
                    <option value="America/New_York">Нью-Йорк (America/New_York)</option>
                    <option value="Asia/Tokyo">Токио (Asia/Tokyo)</option>
                </select>
            </div>

            <div class="time-display">
                <span class="time-part hours">00</span>
                <span class="separator">:</span>
                <span class="time-part minutes">00</span>
                <span class="separator">:</span>
                <span class="time-part seconds">00</span>
            </div>
            <div class="date-display"></div>
            <div class="timezone-info"></div>
        </div>
    </div>

    <script>
      class DigitalClock {
        constructor() {
          this.elements = {
            hours: document.querySelector('.hours'),
            minutes: document.querySelector('.minutes'),
            seconds: document.querySelector('.seconds'),
            dateDisplay: document.querySelector('.date-display'),
            timezoneInfo: document.querySelector('.timezone-info'),
            select: document.getElementById('city-select')
          };

          if (!this.elements.hours || !this.elements.select) {
            console.error('Не найдены элементы часов или селекта часовых поясов');
            return;
          }

          this.previousTime = { hours: -1, minutes: -1, seconds: -1 };
          this.init();
        }

        init() {
          this.updateDate();
          this.displayTimezone();
          setInterval(() => {
            this.updateTime();
            this.updateDate();
          }, 1000);
        }

        formatNum(num) {
          return String(num).padStart(2, '0');
        }

        // ВОТ ЭТОТ МЕТОД ТЕПЕРЬ ПРАВИЛЬНЫЙ — ключи совпадают с previousTime
        getParts(tz) {
          const formatter = new Intl.DateTimeFormat('ru-RU', {
            timeZone: tz,
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
          });
          const parts = formatter.formatToParts(new Date());
          const result = { hours: 0, minutes: 0, seconds: 0 };

          for (const p of parts) {
            if (p.type === 'hour') result.hours = Number(p.value);
            if (p.type === 'minute') result.minutes = Number(p.value);
            if (p.type === 'second') result.seconds = Number(p.value);
          }
          return result;
        }

        updateTime() {
          const tz = this.elements.select.value;
          const now = this.getParts(tz);

          if (now.hours !== this.previousTime.hours) {
            this.elements.hours.textContent = this.formatNum(now.hours);
            this.animateDigitChange(this.elements.hours);
          }
          if (now.minutes !== this.previousTime.minutes) {
            this.elements.minutes.textContent = this.formatNum(now.minutes);
            this.animateDigitChange(this.elements.minutes);
          }
          if (now.seconds !== this.previousTime.seconds) {
            this.elements.seconds.textContent = this.formatNum(now.seconds);
            this.animateDigitChange(this.elements.seconds);
          }

          this.previousTime = {
            hours: now.hours,
            minutes: now.minutes,
            seconds: now.seconds
          };
        }

        animateDigitChange(element) {
          element.classList.remove('updated');
          void element.offsetWidth; // принудительный reflow
          element.classList.add('updated');
        }

        updateDate() {
          const tz = this.elements.select.value;
          const now = new Date();
          const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          };
          const dateString = now.toLocaleDateString('ru-RU', { ...options, timeZone: tz });
          this.elements.dateDisplay.textContent = dateString.charAt(0).toUpperCase() + dateString.slice(1);
        }

        displayTimezone() {
          const tzValue = this.elements.select.value;
          if (tzValue) {
            this.elements.timezoneInfo.textContent = `Часовой пояс: ${tzValue}`;
          } else {
            const resolvedTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            this.elements.timezoneInfo.textContent = `Часовой пояс: (локальный) ${resolvedTz}`;
          }
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        new DigitalClock();
      });
    </script>
</body>
</html>
